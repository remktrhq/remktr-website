<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" style="width:160px;height:160px;display:block;margin:0 auto;">
  <defs>
    <linearGradient id="botbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5e8ff"/>
      <stop offset="100%" style="stop-color:#fffbea"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="96" fill="url(#botbg)" stroke="#e0d0f5" stroke-width="2"/>
  <!-- Head -->
  <rect x="55" y="45" width="90" height="80" rx="20" fill="#6e19ad"/>
  <!-- Eyes -->
  <circle cx="80" cy="78" r="10" fill="#fff"/>
  <circle cx="120" cy="78" r="10" fill="#fff"/>
  <circle cx="82" cy="78" r="5" fill="#FCCC00"/>
  <circle cx="122" cy="78" r="5" fill="#FCCC00"/>
  <!-- Mouth -->
  <rect x="72" y="100" width="56" height="8" rx="4" fill="#FCCC00" opacity="0.9"/>
  <!-- Antenna -->
  <line x1="100" y1="45" x2="100" y2="28" stroke="#6e19ad" stroke-width="3" stroke-linecap="round"/>
  <circle cx="100" cy="24" r="6" fill="#FCCC00"/>
  <!-- Body -->
  <rect x="65" y="130" width="70" height="45" rx="14" fill="#6e19ad" opacity="0.8"/>
  <!-- Chest light -->
  <circle cx="100" cy="152" r="8" fill="#FCCC00" opacity="0.9"/>
  <!-- Arms -->
  <rect x="35" y="133" width="28" height="14" rx="7" fill="#6e19ad" opacity="0.6"/>
  <rect x="137" y="133" width="28" height="14" rx="7" fill="#6e19ad" opacity="0.6"/>
</svg>