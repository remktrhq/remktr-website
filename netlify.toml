[build]
  publish = "."

[[redirects]]
  from = "/dsp-services"
  to = "/dsp-services/"
  status = 301

[[redirects]]
  from = "/prime-video-ads"
  to = "/prime-video-ads/"
  status = 301

[[redirects]]
  from = "/features"
  to = "/features/"
  status = 301

[[redirects]]
  from = "/amc-cloud"
  to = "/amc-cloud/"
  status = 301

[[redirects]]
  from = "/pricing"
  to = "/pricing/"
  status = 301

[[redirects]]
  from = "/requery"
  to = "/requery/"
  status = 301

[[redirects]]
  from = "/dsp-discovery-call"
  to = "/dsp-discovery-call/"
  status = 301

[[redirects]]
  from = "/privacy-policy"
  to = "/privacy-policy/"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/hubfs/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_hcms/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/hs-fs/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = false
  minify = false

[build.processing.js]
  bundle = false
  minify = false

[build.processing.images]
  compress = true
